<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUBE - REDNOVATEL</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .panel { background-color: #1e1e1e; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; text-align: center; border: 1px solid #333; margin-bottom: 20px; }
        h1 { color: #4CAF50; }
        .btn { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin: 10px; }
        .lista-archivos { text-align: left; background: #252525; padding: 15px; border-radius: 5px; }
        .archivo-link { color: #4da3ff; text-decoration: none; display: block; padding: 5px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>NUBE REDNOVATEL</h1>
        <p>Gestión de Archivos y Acceso Remoto</p>
        
        <!-- Botón de Acceso Remoto -->
        <button class="btn" onclick="descargarVNC()">ACCESO REMOTO (VNC)</button>
    </div>

    <div class="panel">
        <h3>Mis Archivos (Respaldos)</h3>
        <div class="lista-archivos">
            <!-- Aquí irás agregando enlaces a tus archivos subidos -->
            <a href="respaldos/documento.pdf" class="archivo-link">📄 documento.pdf</a>
            <a href="imagenes/foto1.jpg" class="archivo-link">🖼️ foto1.jpg</a>
            <p style="font-size: 0.8rem; color: #777;">Para subir más, arrastra los archivos a tu repositorio en GitHub.</p>
        </div>
    </div>

    <script>
        function descargarVNC() {
            const vncContent = "[Connection]\nHost=nube.rednovatel.cl\nPort=5900";
            const blob = new Blob([vncContent], { type: 'application/x-vnc' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Acceso_RedNovatel.vnc';
            a.click();
        }
    </script>
</body>
</html>
